apiVersion: upstream.pgv2.percona.com/v2
kind: PostgresCluster
metadata:
  name: delete-switchover-with-timestamp
spec:
  postgresVersion: ${KUTTL_PG_VERSION}
  patroni:
    switchover:
      enabled: true
  instances:
    - name: instance1
      replicas: 2
      dataVolumeClaimSpec:
        accessModes:
        - "ReadWriteOnce"
        resources:
          requests:
            storage: 1Gi
  backups:
    pgbackrest:
      repos:
      - name: repo1
        volume:
          volumeClaimSpec:
            accessModes:
            - "ReadWriteOnce"
            resources:
              requests:
                storage: 1Gi
