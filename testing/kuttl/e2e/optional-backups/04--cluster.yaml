apiVersion: upstream.pgv2.percona.com/v2
kind: PostgresCluster
metadata:
  name: created-without-backups
spec:
  postgresVersion: ${KUTTL_PG_VERSION}
  instances:
    - name: instance1
      replicas: 2
      dataVolumeClaimSpec:
        accessModes:
        - "ReadWriteOnce"
        resources:
          requests:
            storage: 1Gi

