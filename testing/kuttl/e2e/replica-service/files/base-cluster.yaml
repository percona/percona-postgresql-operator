apiVersion: upstream.pgv2.percona.com/v2
kind: PostgresCluster
metadata:
  name: service
spec:
  postgresVersion: ${KUTTL_PG_VERSION}
  replicaService:
    type: ClusterIP
  instances:
    - name: instance1
      dataVolumeClaimSpec:
        accessModes:
        - "ReadWriteOnce"
        resources:
          requests:
            storage: 0.5Gi
      replicas: 2
  backups:
    pgbackrest:
      repos:
      - name: repo1
        volume:
          volumeClaimSpec:
            accessModes:
            - "ReadWriteOnce"
            resources:
              requests:
                storage: 0.5Gi
