# Create a second pgAdmin that attempts to steal the service
apiVersion: upstream.pgv2.percona.com/v2
kind: PGAdmin
metadata:
  name: pgadmin-service-thief
spec:
  serviceName: pgadmin-owned-service
  dataVolumeClaimSpec:
    accessModes:
    - "ReadWriteOnce"
    resources:
      requests:
        storage: 1Gi
