# Create a pgAdmin that will create and own a service
apiVersion: upstream.pgv2.percona.com/v2
kind: PGAdmin
metadata:
  name: pgadmin-service-owner
spec:
  serviceName: pgadmin-owned-service
  dataVolumeClaimSpec:
    accessModes:
    - "ReadWriteOnce"
    resources:
      requests:
        storage: 1Gi
