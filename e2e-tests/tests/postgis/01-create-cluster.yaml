apiVersion: kuttl.dev/v1beta1
kind: TestStep
timeout: 100
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      source ../../functions

      # Use the PostGIS-enabled PostgreSQL image
      get_cr | yq eval '.spec.image = "'$IMAGE_POSTGIS'"' - | kubectl -n "${NAMESPACE}" apply -f -
