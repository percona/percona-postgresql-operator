apiVersion: kuttl.dev/v1beta1
kind: TestStep
timeout: 30
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      source ../../functions

      cr_ver=2.9.0

      get_cr \
        | yq eval '
            .spec.initContainer.image = "'${IMAGE}'" |
            .spec.crVersion="'${cr_ver}'"' - \
        | kubectl -n "${NAMESPACE}" apply -f -

      sleep 10
