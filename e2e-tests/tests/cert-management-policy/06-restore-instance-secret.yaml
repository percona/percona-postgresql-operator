apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
  - script: |-
      set -o errexit
      set -o pipefail
      set -o xtrace

      source ../../functions

      cluster="cert-management-policy"
      instance=$(kubectl -n "$NAMESPACE" get statefulset \
        -l postgres-operator.crunchydata.com/cluster="$cluster",postgres-operator.crunchydata.com/data=postgres \
        -o jsonpath='{.items[0].metadata.name}')

      new_instance_secret="${instance}-certs"

      instance="$instance" new_instance_secret="$new_instance_secret" yq eval \
        '.items[] | select(.metadata.name | test("-certs$")) |
          .metadata.name = strenv(new_instance_secret) |
          .metadata.labels."postgres-operator.crunchydata.com/instance" = strenv(instance)' \
        "$TEMP_DIR/tls-secrets.yaml" \
        | kubectl -n "$NAMESPACE" apply -f -
