apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
  - script: |-
      set -o errexit
      set -o pipefail
      set -o xtrace

      source ../../functions

      cluster="cert-management-policy"
      instance=$(kubectl -n "$NAMESPACE" get statefulset \
        -l postgres-operator.crunchydata.com/cluster="$cluster",postgres-operator.crunchydata.com/data=postgres \
        -o jsonpath='{.items[0].metadata.name}')

      old_instance_secret=$(yq eval -r \
        '[.items[].metadata.name | select(test("-certs$"))][0] // ""' \
        "$TEMP_DIR/tls-secrets.yaml")
      new_instance_secret="${instance}-certs"

      if [[ -n "$old_instance_secret" && "$old_instance_secret" != "$new_instance_secret" ]]; then
        old_instance_secret="$old_instance_secret" new_instance_secret="$new_instance_secret" yq eval \
          '.items[] | select(.metadata.name == strenv(old_instance_secret)) | .metadata.name = strenv(new_instance_secret)' \
          "$TEMP_DIR/tls-secrets.yaml" \
          | kubectl -n "$NAMESPACE" apply -f -
      fi
