apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      source ../../functions

      yq eval \
        'del(.items[] | select(.metadata.name | test("-certs$")))' \
        "$TEMP_DIR/tls-secrets.yaml" \
        | kubectl -n "$NAMESPACE" apply -f -
