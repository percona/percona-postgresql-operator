apiVersion: kuttl.dev/v1beta1
kind: TestStep
timeout: 120
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      source ../../functions

      vault_name=vault-service

      old_token=$(kubectl -n "${NAMESPACE}" get secret vault-secret -o jsonpath='{.data.token}' | base64 -d)
      new_token=$(kubectl -n ${vault_name} exec ${vault_name}-0 -- \
        sh -c "VAULT_TOKEN=${old_token} vault token create -tls-skip-verify -format=json" | jq -r '.auth.client_token')

      ca_crt=$(kubectl -n "${NAMESPACE}" get secret vault-secret -o jsonpath='{.data.ca\.crt}')

      kubectl -n "${NAMESPACE}" create secret generic vault-secret-rotated \
        --from-literal=token=${new_token} \
        --from-file=ca.crt=<(echo "${ca_crt}" | base64 -d)

      get_cr \
        | yq '.spec.extensions.pg_tde.enabled = true' \
        | yq '.spec.extensions.pg_tde.vault.host = "https://vault-service.vault-service.svc:8200"' \
        | yq '.spec.extensions.pg_tde.vault.mountPath = "tde"' \
        | yq '.spec.extensions.pg_tde.vault.tokenSecret.name = "vault-secret-rotated"' \
        | yq '.spec.extensions.pg_tde.vault.tokenSecret.key = "token"' \
        | yq '.spec.extensions.pg_tde.vault.caSecret.name = "vault-secret-rotated"' \
        | yq '.spec.extensions.pg_tde.vault.caSecret.key = "ca.crt"' \
        | kubectl -n "${NAMESPACE}" apply -f -
