apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 180
commands:
  - script: |
      tmp=$(mktemp)
      kubectl -n $NAMESPACE get pg pg-tde -o yaml | yq '.status.conditions.[] | select(.type == "PGTDEEnabled")' > ${tmp}
      [[ $(cat ${tmp} | yq .message) == "pg_tde is disabled in PerconaPGCluster" ]]
      [[ $(cat ${tmp} | yq .reason) == "Disabled" ]]
      [[ $(cat ${tmp} | yq .status) == "False" ]]
---
kind: StatefulSet
apiVersion: apps/v1
metadata:
  labels:
    postgres-operator.crunchydata.com/cluster: pg-tde
    postgres-operator.crunchydata.com/data: postgres
    postgres-operator.crunchydata.com/instance-set: instance1
  ownerReferences:
    - apiVersion: postgres-operator.crunchydata.com/v1beta1
      kind: PostgresCluster
      name: pg-tde
      controller: true
      blockOwnerDeletion: true
spec:
  template:
    spec:
      containers:
      - name: database
        volumeMounts:
        - mountPath: /pgconf/tls
          name: cert-volume
          readOnly: true
        - mountPath: /pgdata
          name: postgres-data
        - mountPath: /etc/database-containerinfo
          name: database-containerinfo
          readOnly: true
        - mountPath: /pgconf/tde
          name: pg-tde
          readOnly: true
        - mountPath: /etc/pgbackrest/conf.d
          name: pgbackrest-config
          readOnly: true
        - mountPath: /etc/patroni
          name: patroni-config
          readOnly: true
        - mountPath: /opt/crunchy
          name: crunchy-bin
        - mountPath: /tmp
          name: tmp
        - mountPath: /dev/shm
          name: dshm
      - name: replication-cert-copy
      - name: pgbackrest
      - name: pgbackrest-config
      volumes:
      - name: cert-volume
      - name: postgres-data
      - name: database-containerinfo
      - name: pg-tde
        projected:
          defaultMode: 384
          sources:
          - secret:
              items:
              - key: token
                path: token
              name: vault-secret-rotated
          - secret:
              items:
              - key: ca.crt
                path: ca.crt
              name: vault-secret-rotated
      - name: pgbackrest-server
      - name: pgbackrest-config
      - name: patroni-config
      - name: crunchy-bin
      - name: tmp
      - name: dshm
status:
  observedGeneration: 4
  replicas: 1
  readyReplicas: 1
---
apiVersion: pgv2.percona.com/v2
kind: PerconaPGCluster
metadata:
  name: pg-tde
status:
  state: ready
