apiVersion: kuttl.dev/v1beta1
kind: TestStep
timeout: 30
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      source ../../functions

      cluster_name="pg-tde"

      t=1
      for i in $(kubectl get pods -n "${NAMESPACE}" |grep ${cluster_name}-instance| awk '{print $1}'); 
        do echo $i
        data=$(kubectl exec $i -n "${NAMESPACE}" -- bash -c 'psql -q -t -d myapp -c "SELECT * from myTable;"')
        kubectl create configmap -n "${NAMESPACE}" 07-read-from-primary-${t} --from-literal=data="${data}"
        t=$((t+1))
      done
      
