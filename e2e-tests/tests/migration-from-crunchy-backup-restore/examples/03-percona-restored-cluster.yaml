apiVersion: pgv2.percona.com/v2
kind: PerconaPGCluster
metadata:
  name: percona-restored
spec:
  crVersion: 3.0.0
  postgresVersion: 18
  image: docker.io/percona/percona-distribution-postgresql:18.3-2
  instances:
    - name: instance1
      replicas: 3
      dataVolumeClaimSpec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
  proxy:
    pgBouncer:
      replicas: 1
      image: docker.io/percona/percona-pgbouncer:1.25.1-1
  backups:
    pgbackrest:
      image: docker.io/percona/percona-pgbackrest:2.58.0-1
      configuration:
        - secret:
            name: percona-pgbackrest-secret
      global:
        # Percona's own repo — must differ from Crunchy's repo1-path.
        repo1-path: /percona-restored/repo1
        repo1-s3-uri-style: path
        repo1-s3-verify-tls: "n"
      repos:
        - name: repo1
          s3:
            bucket: pg-migration
            endpoint: seaweedfs-all-in-one.postgres-migration.svc.cluster.local:8443
            region: us-east-1
  # Bootstrap the cluster from the Crunchy pgBackRest backup.
  # Remove this block after the cluster is healthy.
  dataSource:
    pgbackrest:
      stanza: db
      configuration:
        - secret:
            name: percona-pgbackrest-secret
      global:
        # Must match repo1-path in the Crunchy source cluster exactly.
        repo1-path: /crunchy-to-percona/repo1
        repo1-s3-uri-style: path
        repo1-s3-verify-tls: "n"
      repo:
        name: repo1
        s3:
          bucket: pg-migration
          endpoint: seaweedfs-all-in-one.postgres-migration.svc.cluster.local:8443
          region: us-east-1
