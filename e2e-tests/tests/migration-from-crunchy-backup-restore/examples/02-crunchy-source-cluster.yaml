---
# Crunchy PGO source cluster with pgBackRest configured to archive WAL to MinIO.
#
# Key requirements:
#   - repo1-path must match the path referenced in the Percona dataSource exactly.
#   - repo1-s3-uri-style: path  is required for MinIO (virtual-host style is AWS-only).
#   - repo1-s3-verify-tls: "n" skips TLS verification; safe for in-cluster MinIO
#     with a self-signed cert.  Remove when using AWS S3 or a valid certificate.
apiVersion: postgres-operator.crunchydata.com/v1beta1
kind: PostgresCluster
metadata:
  name: crunchy-source
spec:
  postgresVersion: 18
  instances:
    - name: instance1
      replicas: 3
      dataVolumeClaimSpec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
  backups:
    pgbackrest:
      configuration:
        - secret:
            name: crunchy-pgbackrest-secret
      manual:
        repoName: repo1
        options:
          - --type=full
      global:
        repo1-path: /crunchy-to-percona/repo1
        repo1-s3-uri-style: path
        repo1-s3-verify-tls: "n"
      repos:
        - name: repo1
          s3:
            bucket: pg-migration
            endpoint: seaweedfs-all-in-one.postgres-migration.svc.cluster.local:8443
            region: us-east-1
  proxy:
    pgBouncer:
      replicas: 1
