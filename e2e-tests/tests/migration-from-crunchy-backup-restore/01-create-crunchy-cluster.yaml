apiVersion: kuttl.dev/v1beta1
kind: TestStep
timeout: 20
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      source ../../functions

      CRUNCHY_NS="${NAMESPACE}-crunchy"
      MINIO_ENDPOINT="minio-service.${NAMESPACE}.svc.cluster.local:9000"
      CRUNCHY_REPO_PATH="/migration-backup-restore/${RANDOM}/crunchy-repo1"

      kubectl create configmap -n "${NAMESPACE}" crunchy-backup-restore-config \
        --from-literal=crunchy-repo-path="${CRUNCHY_REPO_PATH}" \
        --from-literal=minio-endpoint="${MINIO_ENDPOINT}" \
        --from-literal=crunchy-ns="${CRUNCHY_NS}"

      cat "${TEST_CONFIG_DIR}/crunchy-source.yaml" | \
        yq eval ".spec.postgresVersion = ${PG_VER}" | \
        $sed "s|<repo-path>|${CRUNCHY_REPO_PATH}|g" | \
        $sed "s|<minio-endpoint>|${MINIO_ENDPOINT}|g" | \
        kubectl -n "${CRUNCHY_NS}" apply -f -
