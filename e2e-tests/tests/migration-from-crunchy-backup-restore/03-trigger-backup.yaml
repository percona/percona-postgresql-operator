apiVersion: kuttl.dev/v1beta1
kind: TestStep
timeout: 30
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      CRUNCHY_NS="${NAMESPACE}-crunchy"

      # Trigger a full backup so the data written in the previous step is captured
      kubectl -n "${CRUNCHY_NS}" annotate postgrescluster crunchy-source \
        postgres-operator.crunchydata.com/pgbackrest-backup="$(date +%s)"
