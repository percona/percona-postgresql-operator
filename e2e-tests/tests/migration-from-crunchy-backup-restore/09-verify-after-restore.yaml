apiVersion: kuttl.dev/v1beta1
kind: TestStep
timeout: 120
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      source ../../functions

      primary=$(kubectl get pod -n "${NAMESPACE}" \
        -l postgres-operator.crunchydata.com/cluster=percona-restored,postgres-operator.crunchydata.com/role=primary \
        -o jsonpath='{.items[0].metadata.name}')

      if [ -z "${primary}" ]; then
        echo "ERROR: Percona primary pod not found after restore"
        exit 1
      fi

      data=$(kubectl exec -n "${NAMESPACE}" "${primary}" -c database -- bash -c \
        "psql -q -t -d migrationtest -c 'SELECT id, value FROM migration_data ORDER BY id;'")

      echo "Data after PITR restore:"
      echo "${data}"

      kubectl create configmap -n "${NAMESPACE}" 09-restored-data \
        --from-literal=data="${data}"

      # All rows must be present — the PITR restore recovered them from the truncation.
      for expected in "row-one" "row-two" "row-three" "written-after-restore"; do
        echo "${data}" | grep -q "${expected}" || {
          echo "ERROR: '${expected}' missing after PITR restore"
          exit 1
        }
      done

      echo "PASS: all rows recovered by PITR restore"
