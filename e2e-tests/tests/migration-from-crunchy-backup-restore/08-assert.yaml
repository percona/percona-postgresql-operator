apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 600
---
apiVersion: pgv3.percona.com/v2
kind: PerconaPGRestore
metadata:
  name: post-migration-restore
status:
  state: Succeeded
---
# One StatefulSet per pod; readyReplicas=1 each.  Aggregate validated below.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    postgres-operator.crunchydata.com/cluster: percona-restored
    postgres-operator.crunchydata.com/data: postgres
    postgres-operator.crunchydata.com/instance-set: instance1
  ownerReferences:
    - apiVersion: upstream.pgv3.percona.com/v1beta1
      kind: PostgresCluster
      name: percona-restored
      controller: true
      blockOwnerDeletion: true
status:
  availableReplicas: 1
  readyReplicas: 1
  replicas: 1
  updatedReplicas: 1
---
# For user-triggered restores the upstream operator sets restore.id to the
# PerconaPGRestore CR name (unlike bootstrap restores which use ~pgo-bootstrap-*).
# Cluster was scaled to 1 before restore; step 09 scales back to 3.
apiVersion: upstream.pgv3.percona.com/v1beta1
kind: PostgresCluster
metadata:
  name: percona-restored
status:
  instances:
    - name: instance1
      readyReplicas: 1
      replicas: 1
      updatedReplicas: 1
  pgbackrest:
    restore:
      finished: true
      id: post-migration-restore
      succeeded: 1
---
# cluster must be fully ready again after the restore-triggered restart
apiVersion: pgv3.percona.com/v2
kind: PerconaPGCluster
metadata:
  name: percona-restored
status:
  postgres:
    instances:
      - name: instance1
        ready: 1
        size: 1
    ready: 1
    size: 1
  state: ready
