apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 300
commands:
  - script: |-
      set -o errexit

      CRUNCHY_NS="${NAMESPACE}-crunchy"

      kubectl wait deployment pgo \
        -n "${CRUNCHY_NS}" \
        --for=condition=Available \
        --timeout=120s

      kubectl wait deployment percona-postgresql-operator \
        -n "${NAMESPACE}" \
        --for=condition=Available \
        --timeout=120s
