apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 30
commands:
  - script: |-
      set -o errexit

      data=$(kubectl get configmap 09-restored-data -n "${NAMESPACE}" \
        -o jsonpath='{.data.data}')

      for expected in "row-one" "row-two" "row-three" "written-after-restore"; do
        echo "${data}" | grep -q "${expected}" || {
          echo "ERROR: '${expected}' missing after PITR restore. Got: ${data}"
          exit 1
        }
      done

      echo "All expected rows present after PITR restore"
