apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 560
---
kind: Job
apiVersion: batch/v1
metadata:
  annotations:
    postgres-operator.crunchydata.com/pgbackrest-backup: post-migration-backup
  labels:
    postgres-operator.crunchydata.com/pgbackrest-backup: manual
    postgres-operator.crunchydata.com/pgbackrest-repo: repo1
  ownerReferences:
    - apiVersion: pgv2.percona.com/v2
      kind: PerconaPGBackup
      controller: true
      blockOwnerDeletion: true
status:
  succeeded: 1
---
apiVersion: pgv2.percona.com/v2
kind: PerconaPGBackup
metadata:
  name: post-migration-backup
spec:
  pgCluster: percona-restored
  repoName: repo1
status:
  state: Succeeded
