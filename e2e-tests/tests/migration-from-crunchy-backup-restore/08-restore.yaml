apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      source ../../functions

      primary=$(kubectl get pod -n "${NAMESPACE}" \
        -l postgres-operator.crunchydata.com/cluster=percona-restored,postgres-operator.crunchydata.com/role=primary \
        -o jsonpath='{.items[0].metadata.name}')

      if [ -z "${primary}" ]; then
        echo "ERROR: primary pod not found"
        exit 1
      fi

      # Capture the PITR target timestamp before truncating, then force a WAL
      # switch so this LSN is flushed to the archive.
      pitr_target=$(kubectl exec -n "${NAMESPACE}" "${primary}" -c database -- \
        psql -q -t -c "SELECT to_char(clock_timestamp(), 'YYYY-MM-DD HH24:MI:SS')" \
        | xargs)
      kubectl exec -n "${NAMESPACE}" "${primary}" -c database -- \
        psql -q -c "SELECT pg_switch_wal();"
      echo "PITR target: ${pitr_target}"

      # Truncate the table to prove the restore brings the data back.
      kubectl exec -n "${NAMESPACE}" "${primary}" -c database -- \
        psql -d migrationtest -c "TRUNCATE TABLE migration_data;"

      count=$(kubectl exec -n "${NAMESPACE}" "${primary}" -c database -- bash -c \
        "psql -q -t -d migrationtest -c 'SELECT count(*) FROM migration_data;' | tr -d ' '")
      if [ "${count}" != "0" ]; then
        echo "ERROR: expected 0 rows after truncate, got ${count}"
        exit 1
      fi
      echo "Table truncated — triggering PITR restore to ${pitr_target}"

      # Resolve the latest full backup label so --set pins the restore to exactly
      # that backup (avoids ambiguity if older backups exist in the repo).
      backup_label=$(kubectl -n "${NAMESPACE}" exec "${primary}" -- \
        pgbackrest info --output json --log-level-console=info --stanza=db \
        | jq -r '[.[] | .backup[] | select(.type == "full") | select(.database.["repo-key"] == 1)][-1].label')

      if [ -z "${backup_label}" ] || [ "${backup_label}" = "null" ]; then
        echo "ERROR: could not determine latest full backup label"
        exit 1
      fi
      echo "Restoring from backup: ${backup_label}"

      cat <<EOF | kubectl -n "${NAMESPACE}" apply -f -
      apiVersion: pgv2.percona.com/v2
      kind: PerconaPGRestore
      metadata:
        name: post-migration-restore
      spec:
        pgCluster: percona-restored
        repoName: repo1
        options:
        - --set=${backup_label}
        - --type=time
        - --target="${pitr_target}"
        - --target-timeline=current
      EOF
    timeout: 300
