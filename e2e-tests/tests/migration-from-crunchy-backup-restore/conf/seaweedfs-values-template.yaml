global:
  seaweedfs:
    # Avoid creating a cluster-scoped ClusterRole that persists across test runs
    # and blocks re-installation in a different namespace.
    createClusterRole: false

allInOne:
  enabled: true
  s3:
    enabled: true
    enableAuth: true
    createBuckets:
      - name: operator-testing
        anonymousRead: false
  extraArgs:
    - "-s3.port.https=8443"
    - "-s3.cert.file=/tls/tls.crt"
    - "-s3.key.file=/tls/tls.key"
  extraVolumeMounts: |
    - name: s3-tls
      readOnly: true
      mountPath: /tls
  extraVolumes: |
    - name: s3-tls
      secret:
        secretName: seaweedfs-s3-tls

# Disable standalone components — allInOne runs all services in one pod.
master:
  enabled: false

filer:
  enabled: false

volume:
  enabled: false

s3:
  httpsPort: 8443
  enableAuth: true
  credentials:
    admin:
      accessKey: ${access_key}
      secretKey: ${secret_key}
