apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 360
commands:
- script: |-
    kubectl -n ${NAMESPACE} get cm \
      -l app.kubernetes.io/instance=major-upgrade-15-to-16 \
      -l app.kubernetes.io/component=pg -o yaml
    kubectl -n ${NAMESPACE} get pg,pod,job
    sleep 5
---
apiVersion: pgv2.percona.com/v2
kind: PerconaPGCluster
metadata:
  name: major-upgrade-15-to-16
spec:
  postgresVersion: 16
status:
  pgbouncer:
    ready: 3
    size: 3
  postgres:
    instances:
    - name: instance1
      ready: 3
      size: 3
    ready: 3
    size: 3
  state: ready
---
apiVersion: pgv2.percona.com/v2
kind: PerconaPGUpgrade
metadata:
  name: 15-to-16
status:
  conditions:
  - type: Progressing
    reason: PGUpgradeCompleted
    status: "False"
    observedGeneration: 1
  - type: Succeeded
    reason: PGUpgradeSucceeded
    status: "True"
    observedGeneration: 1
  observedGeneration: 1
---
kind: Job
apiVersion: batch/v1
metadata:
  labels:
    postgres-operator.crunchydata.com/cluster: major-upgrade-15-to-16
    postgres-operator.crunchydata.com/pgbackrest: ''
    postgres-operator.crunchydata.com/pgbackrest-backup: replica-create
    postgres-operator.crunchydata.com/pgbackrest-repo: repo1
  ownerReferences:
    - apiVersion: pgv2.percona.com/v2
      kind: PerconaPGBackup
      controller: true
      blockOwnerDeletion: true
status:
  succeeded: 1
