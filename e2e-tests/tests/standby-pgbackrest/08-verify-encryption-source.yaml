apiVersion: kuttl.dev/v1beta1
kind: TestStep
timeout: 60
commands:
  - script: |-
      set -o xtrace

      source ../../functions

      result=$(run_psql_command \
        "SELECT extname FROM pg_extension WHERE extname = 'pg_tde';" \
        "$(get_psql_uri source-cluster postgres)")
      kubectl -n "${NAMESPACE}" create configmap 08-verify-extension-source --from-literal=pg_tde_extension="$result"

      result=$(run_psql_command \
        "SELECT pg_tde_is_encrypted('myTable');" \
        "$(get_psql_uri source-cluster postgres)/myapp")
      kubectl -n "${NAMESPACE}" create configmap 08-verify-encryption-source --from-literal=pg_tde_is_encrypted="$result"

      # pg_tde_verify_key will throw an error if it fails
      run_psql_command \
        "SELECT pg_tde_verify_key();" \
        "$(get_psql_uri source-cluster postgres)/myapp"

      data=$(run_psql_local \
        '\c myapp \\\ SELECT * from myTable;' \
        "$(get_psql_uri source-cluster postgres)")

      kubectl create configmap -n "${NAMESPACE}" 08-verify-data-source --from-literal=data="${data}"
