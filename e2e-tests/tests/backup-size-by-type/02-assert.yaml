apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 900
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      kubectl wait --for=jsonpath='{.status.state}'=Succeeded --timeout=900s -n "${NAMESPACE}" pg-backup/backup-size-full
      kubectl wait --for=jsonpath='{.status.backupType}'=full --timeout=60s -n "${NAMESPACE}" pg-backup/backup-size-full
      kubectl -n "${NAMESPACE}" get pg-backup backup-size-full -o json | jq -e '.status.size != null' >/dev/null

