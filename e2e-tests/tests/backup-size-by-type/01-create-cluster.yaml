apiVersion: kuttl.dev/v1beta1
kind: TestStep
timeout: 20
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      source ../../functions

      get_cr "backup-size-by-type" ${RANDOM} \
        | yq '.spec.backups.pgbackrest.global.log-level-console="info"' \
        | yq '.spec.backups.pgbackrest.jobs.backoffLimit=20' \
        | yq '.spec.backups.pgbackrest.jobs.restartPolicy="OnFailure"' \
        | kubectl -n "${NAMESPACE}" apply -f -

