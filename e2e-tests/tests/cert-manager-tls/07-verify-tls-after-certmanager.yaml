apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      source ../../functions

      ssl_info=$(run_psql_local "SHOW ssl;" "postgres:$(get_psql_user_pass cert-manager-tls-pguser-postgres)@$(get_psql_user_host cert-manager-tls-pguser-postgres)")

      if [[ "$ssl_info" != *"on"* ]]; then
          echo "SSL is not enabled on PostgreSQL after cert-manager installation"
          exit 1
      fi

      repl_ssl_count=$(run_psql_local \
        "SELECT count(*) FROM pg_stat_ssl s JOIN pg_stat_replication r ON s.pid = r.pid WHERE s.ssl = true;" \
        "postgres:$(get_psql_user_pass cert-manager-tls-pguser-postgres)@cert-manager-tls-primary")
      repl_ssl_count=$(echo "$repl_ssl_count" | tr -d '[:space:]')

      if [[ "$repl_ssl_count" -lt 1 ]]; then
          echo "No SSL replication connections found after cert-manager install, got: $repl_ssl_count"
          exit 1
      fi

      pgb_ssl=$(run_psql_local "SELECT ssl FROM pg_stat_ssl WHERE pid = pg_backend_pid();" "cert-manager-tls:$(get_psql_user_pass cert-manager-tls-pguser-cert-manager-tls)@cert-manager-tls-pgbouncer/postgres")

      if [[ "$pgb_ssl" != *"t"* ]]; then
          echo "PgBouncer-to-PostgreSQL connection is not using SSL after cert-manager install"
          exit 1
      fi

      instance=$(kubectl -n "$NAMESPACE" get pod \
        -l postgres-operator.crunchydata.com/cluster=cert-manager-tls,postgres-operator.crunchydata.com/role=primary \
        -o jsonpath='{.items[0].metadata.name}')

      kubectl -n "$NAMESPACE" exec "$instance" -c pgbackrest -- pgbackrest info

      data=$(run_psql_local '\c myapp \\\ SELECT * from myApp;' "postgres:$(get_psql_user_pass cert-manager-tls-pguser-postgres)@$(get_psql_user_host cert-manager-tls-pguser-postgres)")

      if [[ "$data" != *"100500"* ]]; then
          echo "FAIL: Data is not intact after cert-manager installation"
          exit 1
      fi
    timeout: 30
