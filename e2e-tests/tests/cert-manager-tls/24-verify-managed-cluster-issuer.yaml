apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      source ../../functions

      # ClusterIssuers are cluster-scoped, so the name is qualified by the
      # test's namespace to avoid collisions with other test runs sharing
      # the same Kubernetes cluster.
      issuer_name="${NAMESPACE}-shared-issuer"

      kubectl -n "$NAMESPACE" patch perconapgcluster cert-manager-tls \
        --type=merge \
        -p="{\"spec\":{\"tls\":{\"issuerConf\":{\"name\":\"${issuer_name}\",\"kind\":\"ClusterIssuer\"}}}}"

      wait_cluster_consistency cert-manager-tls

      ca_issuer_ready=$(kubectl get clusterissuer "${issuer_name}-ca-issuer" -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}')
      if [[ "$ca_issuer_ready" != "True" ]]; then
          echo "Managed CA ClusterIssuer is not ready: $ca_issuer_ready"
          exit 1
      fi

      ca_issuer_managed_by=$(kubectl get clusterissuer "${issuer_name}-ca-issuer" -o jsonpath='{.metadata.labels.app\.kubernetes\.io/managed-by}')
      if [[ "$ca_issuer_managed_by" != "percona-postgresql-operator" ]]; then
          echo "Managed CA ClusterIssuer is missing the operator's managed-by label, got: $ca_issuer_managed_by"
          exit 1
      fi

      ca_cert_ready=$(kubectl -n cert-manager get certificate "${issuer_name}-ca-cert" -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}')
      if [[ "$ca_cert_ready" != "True" ]]; then
          echo "Managed cluster CA certificate is not ready: $ca_cert_ready"
          exit 1
      fi

      tls_issuer_ready=$(kubectl get clusterissuer "${issuer_name}" -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}')
      if [[ "$tls_issuer_ready" != "True" ]]; then
          echo "Managed TLS ClusterIssuer is not ready: $tls_issuer_ready"
          exit 1
      fi

      tls_issuer_managed_by=$(kubectl get clusterissuer "${issuer_name}" -o jsonpath='{.metadata.labels.app\.kubernetes\.io/managed-by}')
      if [[ "$tls_issuer_managed_by" != "percona-postgresql-operator" ]]; then
          echo "Managed TLS ClusterIssuer is missing the operator's managed-by label, got: $tls_issuer_managed_by"
          exit 1
      fi

      tls_issuer_secret=$(kubectl get clusterissuer "${issuer_name}" -o jsonpath='{.spec.ca.secretName}')
      if [[ "$tls_issuer_secret" != "${issuer_name}-ca-cert" ]]; then
          echo "Managed TLS ClusterIssuer references the wrong CA secret, got: $tls_issuer_secret"
          exit 1
      fi

      cluster_cert_issuer_name=$(kubectl -n "$NAMESPACE" get certificate cert-manager-tls-cluster-cert -o jsonpath='{.spec.issuerRef.name}')
      cluster_cert_issuer_kind=$(kubectl -n "$NAMESPACE" get certificate cert-manager-tls-cluster-cert -o jsonpath='{.spec.issuerRef.kind}')
      if [[ "$cluster_cert_issuer_name" != "$issuer_name" || "$cluster_cert_issuer_kind" != "ClusterIssuer" ]]; then
          echo "Cluster certificate does not reference the managed ClusterIssuer, got name=$cluster_cert_issuer_name kind=$cluster_cert_issuer_kind"
          exit 1
      fi

      cluster_cert_ready=$(kubectl -n "$NAMESPACE" get certificate cert-manager-tls-cluster-cert -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}')
      if [[ "$cluster_cert_ready" != "True" ]]; then
          echo "Cluster certificate is not ready after switching to the managed ClusterIssuer: $cluster_cert_ready"
          exit 1
      fi
    timeout: 300
