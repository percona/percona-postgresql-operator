apiVersion: kuttl.dev/v1beta1
kind: TestStep
delete:
- apiVersion: pgv2.percona.com/v2
  kind: PerconaPGCluster
  metadata:
    name: cert-manager-tls
- apiVersion: upstream.pgv2.percona.com/v1beta1
  kind: PostgresCluster
  metadata:
    name: cert-manager-tls
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      source ../../functions

      remove_all_finalizers
      check_operator_panic
      destroy_operator

      # Cluster-scoped, so not owned by (and not garbage-collected with) the
      # namespaced PostgresCluster/PerconaPGCluster deleted above.
      issuer_name="${NAMESPACE}-shared-issuer"
      kubectl delete clusterissuer "$issuer_name" "${issuer_name}-ca-issuer" --ignore-not-found=true

      destroy_cert_manager
    timeout: 60