apiVersion: kuttl.dev/v1beta1
kind: TestStep
timeout: 30
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      source ../../functions

      run_psql_local \
        'CREATE DATABASE newapp; \c newapp \\\ CREATE TABLE IF NOT EXISTS newApp (id int PRIMARY KEY);' \
        "postgres:$(get_psql_user_pass cert-manager-tls-pguser-postgres)@$(get_psql_user_host cert-manager-tls-pguser-postgres)"

      run_psql_local \
        '\c newapp \\\ INSERT INTO newApp (id) VALUES (200500)' \
        "postgres:$(get_psql_user_pass cert-manager-tls-pguser-postgres)@$(get_psql_user_host cert-manager-tls-pguser-postgres)"
