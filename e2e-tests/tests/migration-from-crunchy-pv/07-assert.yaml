apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 600
---
apiVersion: pgv2.percona.com/v2
kind: PerconaPGRestore
metadata:
  name: post-migration-restore
status:
  state: Succeeded
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    postgres-operator.crunchydata.com/cluster: percona-migrated
    postgres-operator.crunchydata.com/data: postgres
    postgres-operator.crunchydata.com/instance-set: instance1
  ownerReferences:
    - apiVersion: upstream.pgv2.percona.com/v1beta1
      kind: PostgresCluster
      name: percona-migrated
      controller: true
      blockOwnerDeletion: true
status:
  availableReplicas: 1
  readyReplicas: 1
  replicas: 1
  updatedReplicas: 1
---
apiVersion: upstream.pgv2.percona.com/v1beta1
kind: PostgresCluster
metadata:
  name: percona-migrated
status:
  instances:
    - name: instance1
      readyReplicas: 1
      replicas: 1
      updatedReplicas: 1
  pgbackrest:
    restore:
      finished: true
      id: post-migration-restore
      succeeded: 1
---
apiVersion: pgv2.percona.com/v2
kind: PerconaPGCluster
metadata:
  name: percona-migrated
status:
  postgres:
    instances:
      - name: instance1
        ready: 1
        size: 1
    ready: 1
    size: 1
  state: ready
