apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      source ../../functions

      primary=$(kubectl get pod -n "${NAMESPACE}" \
        -l postgres-operator.crunchydata.com/cluster=percona-migrated,postgres-operator.crunchydata.com/role=primary \
        -o jsonpath='{.items[0].metadata.name}')

      if [ -z "${primary}" ]; then
        echo "ERROR: Percona primary pod not found"
        exit 1
      fi

      # Capture the PITR target timestamp before inserting post-backup rows,
      # then force a WAL switch so this LSN is flushed to the archive.
      pitr_target=$(kubectl exec -n "${NAMESPACE}" "${primary}" -c database -- \
        psql -q -t -c "SELECT to_char(clock_timestamp(), 'YYYY-MM-DD HH24:MI:SS')" \
        | xargs)
      kubectl exec -n "${NAMESPACE}" "${primary}" -c database -- \
        psql -q -c "SELECT pg_switch_wal();"
      echo "PITR target: ${pitr_target}"

      # Insert rows AFTER the captured timestamp — these must be absent after restore.
      kubectl exec -n "${NAMESPACE}" "${primary}" -c database -- bash -c "
        psql -d migrationtest -c \"INSERT INTO migration_data VALUES (4, 'post-backup-row-one');\"
        psql -d migrationtest -c \"INSERT INTO migration_data VALUES (5, 'post-backup-row-two');\"
      "

      # Resolve the step-06 full backup label so --set pins the restore to exactly
      # that backup (avoids ambiguity if older backups exist in the repo).
      backup_label=$(kubectl -n "${NAMESPACE}" exec "${primary}" -- \
        pgbackrest info --output json --log-level-console=info --stanza=db \
        | jq -r '[.[] | .backup[] | select(.type == "full") | select(.database.["repo-key"] == 1)][-1].label')

      if [ -z "${backup_label}" ] || [ "${backup_label}" = "null" ]; then
        echo "ERROR: could not determine latest full backup label"
        exit 1
      fi
      echo "Restoring from backup: ${backup_label}"

      cat <<EOF | kubectl -n "${NAMESPACE}" apply -f -
      apiVersion: pgv2.percona.com/v2
      kind: PerconaPGRestore
      metadata:
        name: post-migration-restore
      spec:
        pgCluster: percona-migrated
        repoName: repo1
        options:
        - --set=${backup_label}
        - --type=time
        - --target="${pitr_target}"
        - --target-timeline=current
      EOF
    timeout: 60
