apiVersion: pgv2.percona.com/v2
kind: PerconaPGCluster
metadata:
  name: percona-migrated
spec:
  crVersion: 3.0.0
  image: docker.io/percona/percona-postgresql-operator:3.0.0
  postgresVersion: 18
  instances:
    - name: instance1
      replicas: 1
      dataVolumeClaimSpec:
        accessModes:
          - ReadWriteOnce
        # Bind exclusively to the PV that was released from the Crunchy cluster.
        selector:
          matchLabels:
            percona-pv-migration: migrated
        resources:
          requests:
            storage: 10Gi
  proxy:
    pgBouncer:
      replicas: 1
      image: docker.io/percona/percona-pgbouncer:1.25.1-1
  backups:
    pgbackrest:
      image: docker.io/percona/percona-pgbackrest:2.58.0-1
      repos:
        - name: repo1
          volume:
            volumeClaimSpec:
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 10Gi
