apiVersion: kuttl.dev/v1beta1
kind: TestStep
delete:
  - apiVersion: pgv2.percona.com/v2
    kind: PerconaPGCluster
    metadata:
      name: percona-migrated
  - apiVersion: upstream.pgv2.percona.com/v1beta1
    kind: PostgresCluster
    metadata:
      name: percona-migrated
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      source ../../functions

      # Remove Crunchy source cluster if it still exists (e.g. test failed
      # before step 03 could delete it).
      kubectl patch postgrescluster crunchy-source -n "${NAMESPACE}" \
        --type=json -p='[{"op":"remove","path":"/metadata/finalizers"}]' 2>/dev/null || true
      kubectl delete postgrescluster crunchy-source -n "${NAMESPACE}" \
        --ignore-not-found || true

      # pgo was already uninstalled in step 03; this is a safety net in case
      # the test failed before reaching that step.
      helm uninstall pgo --namespace "${NAMESPACE}" --ignore-not-found || true

      # Release the migrated PV back to the Delete policy so the storage
      # provisioner can reclaim it after the namespace is removed.
      pv_name=$(kubectl get configmap pv-names -n "${NAMESPACE}" \
        -o jsonpath='{.data.pv-name}' 2>/dev/null) || true
      if [ -n "${pv_name}" ]; then
        kubectl patch pv "${pv_name}" \
          -p '{"spec":{"persistentVolumeReclaimPolicy":"Delete"}}' 2>/dev/null || true
        kubectl label pv "${pv_name}" percona-pv-migration- 2>/dev/null || true
      fi

      remove_all_finalizers
      check_operator_panic
      destroy_operator
    timeout: 120
