apiVersion: kuttl.dev/v1beta1
kind: TestStep
timeout: 300
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      source ../../functions

      # Remove selector.matchLabels atomically with the scale-up.  If left in place,
      # the new replica PVCs would also try to bind the labeled PV (only one exists)
      # and get stuck Pending.  The primary's PVC is unaffected (already bound).
      kubectl -n "${NAMESPACE}" patch perconapgcluster percona-migrated \
        --type=json \
        -p='[
          {"op":"remove","path":"/spec/instances/0/dataVolumeClaimSpec/selector"},
          {"op":"replace","path":"/spec/instances/0/replicas","value":3}
        ]'

      # Wait for all 3 postgres pods to be Running.
      attempt=0
      while [ "${attempt}" -lt 30 ]; do
        running=$(kubectl get pods -n "${NAMESPACE}" \
          -l postgres-operator.crunchydata.com/cluster=percona-migrated,postgres-operator.crunchydata.com/data=postgres \
          --field-selector=status.phase=Running \
          -o jsonpath='{.items[*].metadata.name}' | wc -w | tr -d ' ')
        echo "Running postgres pods: ${running}/3 (attempt ${attempt}/30)"
        if [ "${running}" = "3" ]; then break; fi
        attempt=$((attempt + 1))
        sleep 10
      done
      if [ "${running}" != "3" ]; then
        echo "ERROR: timed out waiting for 3 postgres pods"
        exit 1
      fi

      # -----------------------------------------------------------------------
      # Verify the migrated data is visible on every pod — primary and both
      # replicas.  This confirms that replication from the migrated PV data
      # bootstrapped correctly on the new replicas.
      # -----------------------------------------------------------------------
      all_pods=$(kubectl get pods -n "${NAMESPACE}" \
        -l postgres-operator.crunchydata.com/cluster=percona-migrated,postgres-operator.crunchydata.com/data=postgres \
        --field-selector=status.phase=Running \
        -o jsonpath='{.items[*].metadata.name}')

      combined=""
      for pod in ${all_pods}; do
        role=$(kubectl get pod -n "${NAMESPACE}" "${pod}" \
          -o jsonpath='{.metadata.labels.postgres-operator\.crunchydata\.com/role}')
        echo "Querying pod ${pod} (role=${role})..."

        data=$(kubectl exec -n "${NAMESPACE}" "${pod}" -c database -- bash -c \
          "psql -q -t -d migrationtest -c 'SELECT id, value FROM migration_data ORDER BY id;'" \
          2>/dev/null)
        echo "  ${pod}: ${data}"

        for expected in "row-one" "row-two" "row-three"; do
          echo "${data}" | grep -q "${expected}" || {
            echo "ERROR: '${expected}' missing on pod ${pod} (role=${role})"
            exit 1
          }
        done

        combined="${combined}${pod}(${role}): ${data}\n"
      done

      kubectl create configmap -n "${NAMESPACE}" 05-migrated-data \
        --from-literal=pods="${all_pods}" \
        --from-literal=data="$(printf '%b' "${combined}")"

      echo "PASS: all original rows present on all 3 pods — PV migration and replication verified"
