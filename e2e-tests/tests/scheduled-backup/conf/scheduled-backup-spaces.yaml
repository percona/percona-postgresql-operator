apiVersion: pgv2.percona.com/v2
kind: PerconaPGCluster
metadata:
  name: some-name
spec:
  backups:
    pgbackrest:
      configuration:
        - secret:
            name: scheduled-backup-pgbackrest-secrets
      manual:
        repoName: repo1
        options:
          - --type=full
      global:
        repo1-path: /backrestrepo/postgres-operator/<repo-path>/repo1
        repo2-path: /backrestrepo/postgres-operator/<repo-path>/repo2
        repo3-path: /backrestrepo/postgres-operator/<repo-path>/repo3
      repos:
        - name: repo1
          s3:
            bucket: <bucket>
            endpoint: ams3.digitaloceanspaces.com
            region: ams3
        - name: repo2
          s3:
            bucket: <bucket>
            endpoint: ams3.digitaloceanspaces.com
            region: ams3
        - name: repo3
          s3:
            bucket: <bucket>
            endpoint: ams3.digitaloceanspaces.com
            region: ams3