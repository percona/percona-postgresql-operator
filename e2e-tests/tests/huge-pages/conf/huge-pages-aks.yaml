apiVersion: pgv2.percona.com/v2
kind: PerconaPGCluster
metadata:
  name: huge-pages
spec:
  instances:
    - affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: hugepages
                    operator: In
                    values:
                      - enabled
