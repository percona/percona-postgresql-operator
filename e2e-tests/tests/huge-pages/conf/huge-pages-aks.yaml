apiVersion: pgv3.percona.com/v2
kind: PerconaPGCluster
metadata:
  name: huge-pages
spec:
  instances:
    - name: instance1
      replicas: 3
      dataVolumeClaimSpec:
        accessModes:
        - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: hugepages
                    operator: In
                    values:
                      - enabled
