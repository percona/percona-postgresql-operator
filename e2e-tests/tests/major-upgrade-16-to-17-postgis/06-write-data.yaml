apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      source ../../functions

      run_psql_local \
        '\c myapp \\\ INSERT INTO myApp (id) VALUES (100501)' \
        "postgres:$(get_psql_user_pass major-upgrade-16-to-17-postgis-pguser-postgres)@$(get_psql_user_host major-upgrade-16-to-17-postgis-pguser-postgres)"

      run_psql_local \
        '\c mygisdata \\\ INSERT INTO gis.locations (id, geom) VALUES (2, ST_GeomFromText($$POINT(40 20)$$, 4326))' \
        "postgres:$(get_psql_user_pass major-upgrade-16-to-17-postgis-pguser-postgres)@$(get_psql_user_host major-upgrade-16-to-17-postgis-pguser-postgres)"
