apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      source ../../functions
      data=$(run_psql_local '\c myapp \\\ SELECT * from myApp;' "postgres:$(get_psql_user_pass major-upgrade-16-to-17-postgis-pguser-postgres)@$(get_psql_user_host major-upgrade-16-to-17-postgis-pguser-postgres)")
      postgis=$(run_psql_local '\c mygisdata \\\ SELECT ST_AsText(geom) FROM gis.locations ORDER BY id;' "postgres:$(get_psql_user_pass major-upgrade-16-to-17-postgis-pguser-postgres)@$(get_psql_user_host major-upgrade-16-to-17-postgis-pguser-postgres)")

      kubectl create configmap -n "${NAMESPACE}" 03-read-from-primary --from-literal=data="${data}" --from-literal=postgis="${postgis}"
