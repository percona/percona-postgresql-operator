apiVersion: pgv3.percona.com/v2
kind: PerconaPGCluster
metadata:
  name: k8s-upgrade
spec:
  backups:
    pgbackrest:
      configuration:
        - secret:
            name: k8s-upgrade-pgbackrest-secrets
      manual:
        repoName: repo1
        options:
          - --type=full
      global:
        repo1-path: /backrestrepo/postgres-operator/<repo-path>/repo1
      repos:
        - name: repo1
          s3:
            bucket: <bucket>
            endpoint: ams3.digitaloceanspaces.com
            region: ams3
