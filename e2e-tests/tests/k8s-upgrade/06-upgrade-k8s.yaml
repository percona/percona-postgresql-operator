apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
  - timeout: 1000
    script: |-
      set -o errexit
      set -o xtrace

      source ../../functions

      name=$(kubectl get configmap cluster-name -o jsonpath='{.data.name}' -n ${NAMESPACE})
      offset=1 # latest version
      version=$(kubectl get configmap latest-cluster-version -o jsonpath='{.data.version}' -n ${NAMESPACE})
      upgrade_k8s_cluster "$name" "$version"
