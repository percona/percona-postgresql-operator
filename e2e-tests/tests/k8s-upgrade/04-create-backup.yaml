apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
  - timeout: 30
    script: |
      kubectl apply -n ${NAMESPACE} -f - <<EOF
      apiVersion: pgv3.percona.com/v2
      kind: PerconaPGBackup
      metadata:
        name: k8s-upgrade-full-repo1
      spec:
        pgCluster: k8s-upgrade
        repoName: repo1
        options:
          - --type=full
      EOF
