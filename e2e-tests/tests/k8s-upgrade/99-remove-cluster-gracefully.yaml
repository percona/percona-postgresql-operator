apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
  - timeout: 1000
    script: |-
      set -o errexit
      set -o xtrace

      source ../../functions

      kubectl delete pg --all
      remove_all_finalizers
      check_operator_panic
      destroy_operator
      cluster_name="$(kubectl get configmap cluster-name -n ${NAMESPACE} -o jsonpath='{.data.name}')"
      delete_k8s_cluster $cluster_name "${PLATFORM}" "${REGION}"
