apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
  - timeout: 60
    script: |-
      set -o errexit
      set -o xtrace

      source ../../functions

      run_psql_local \
        '\c myapp \\\ INSERT INTO myApp (id) VALUES (100501)' \
        "postgres:$(get_psql_user_pass k8s-upgrade-pguser-postgres)@$(get_psql_user_host k8s-upgrade-pguser-postgres)"
