apiVersion: kuttl.dev/v1beta1
kind: TestStep
timeout: 10
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      source ../../functions

      platform=$(detect_k8s_platform)
      export platform
      get_cr "cluster-from-snapshot" ${RANDOM} \
        | yq e '
          .spec.instances[0].dataVolumeClaimSpec.dataSource = {
            "apiGroup": "snapshot.storage.k8s.io",
            "kind": "VolumeSnapshot",
            "name": "backup3-pgdata"
          }
          |
          (
            select(strenv(platform) == "eks" or strenv(platform) == "openshift")
            | .spec.instances[0].dataVolumeClaimSpec.storageClassName = "ebs-csi-gp3"
          )
          // .
        ' \
        | kubectl -n "${NAMESPACE}" apply -f -