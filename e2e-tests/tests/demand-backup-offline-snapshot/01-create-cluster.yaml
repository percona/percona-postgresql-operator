apiVersion: kuttl.dev/v1beta1
kind: TestStep
timeout: 10
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      source ../../functions
      
      snapshot_class='gke-snapshot-class'
      platform=$(detect_k8s_platform)
      case "$platform" in
        eks)
          snapshot_class='eks-snapshot-class'
          ;;
        openshift)
          snapshot_class='openshift-snapshot-class'
          ;;
        aks)
          snapshot_class='aks-snapshot-class'
          ;;
        digitalocean)
          snapshot_class='do-block-storage'
          ;;
      esac

      export platform snapshot_class
      get_cr "backup-snapshot" ${RANDOM} \
        | yq e '
          .spec.backups.volumeSnapshots.className = strenv(snapshot_class)
          |
          .spec.backups.volumeSnapshots.mode = "offline"
          |
          (
            select(strenv(platform) == "eks" or strenv(platform) == "openshift")
            | .spec.instances[0].dataVolumeClaimSpec.storageClassName = "ebs-csi-gp3"
          )
          // .
        ' \
        | kubectl -n "${NAMESPACE}" apply -f -
