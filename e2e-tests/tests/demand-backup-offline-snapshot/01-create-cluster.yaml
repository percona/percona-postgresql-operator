apiVersion: kuttl.dev/v1beta1
kind: TestStep
timeout: 10
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      source ../../functions
      
      snapshot_class='gke-snapshot-class'
      platform=$(detect_k8s_platform)
      if [[ "$platform" == "eks" ]]; then
        snapshot_class='eks-snapshot-class'
      elif [[ "$platform" == "digitalocean" ]]; then
        snapshot_class='do-block-storage'
      fi
      get_cr "backup-snapshot" ${RANDOM} \
        | yq ".spec.backups.volumeSnapshots.className=\"$snapshot_class\"" \
        | yq '.spec.backups.volumeSnapshots.mode="offline"' \
        | kubectl -n "${NAMESPACE}" apply -f -
