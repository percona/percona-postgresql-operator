apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 300
commands:
  - script: |-
      set -o errexit

      CRUNCHY_NS="${NAMESPACE}-crunchy"

      kubectl wait job \
        -l postgres-operator.crunchydata.com/pgbackrest-backup=manual,postgres-operator.crunchydata.com/cluster=crunchy-source \
        -n "${CRUNCHY_NS}" \
        --for=condition=Complete \
        --timeout=270s
