apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 300
commands:
  - script: |-
      set -o errexit

      kubectl wait job \
        -l postgres-operator.crunchydata.com/pgbackrest-backup=manual,postgres-operator.crunchydata.com/cluster=crunchy-source \
        -n "${NAMESPACE}" \
        --for=condition=Complete \
        --timeout=270s
