apiVersion: kuttl.dev/v1beta1
kind: TestStep
timeout: 120
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      source ../../functions

      # Shut down the Crunchy source cluster (optional step — frees resources
      # and ensures no split-brain once Percona is promoted).
      kubectl patch postgrescluster crunchy-source \
        -n "${NAMESPACE}" \
        --type=merge \
        -p '{"spec": {"shutdown": true}}'

      # Wait for all Crunchy database pods to terminate
      kubectl wait pod \
        -l postgres-operator.crunchydata.com/cluster=crunchy-source,postgres-operator.crunchydata.com/data=postgres \
        -n "${NAMESPACE}" \
        --for=delete \
        --timeout=120s || true

      echo "Crunchy source cluster shut down"
