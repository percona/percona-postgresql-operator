apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 480
---
# One StatefulSet per pod (readyReplicas=1 each); aggregate validated below.
# Patroni has elected a new primary — the cluster is no longer in standby mode.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    postgres-operator.crunchydata.com/cluster: percona-standby
    postgres-operator.crunchydata.com/data: postgres
    postgres-operator.crunchydata.com/instance-set: instance1
  ownerReferences:
    - apiVersion: upstream.pgv2.percona.com/v1beta1
      kind: PostgresCluster
      name: percona-standby
      controller: true
      blockOwnerDeletion: true
status:
  availableReplicas: 1
  readyReplicas: 1
  replicas: 1
  updatedReplicas: 1
---
# spec.standby.enabled=false confirms the patch landed; state=ready confirms
# Patroni elected a primary and all 3 instances are healthy.
apiVersion: pgv2.percona.com/v2
kind: PerconaPGCluster
metadata:
  name: percona-standby
spec:
  standby:
    enabled: false
status:
  postgres:
    instances:
      - name: instance1
        ready: 3
        size: 3
    ready: 3
    size: 3
  state: ready
