apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      CRUNCHY_NS="${NAMESPACE}-crunchy"

      # Trigger a full backup now that the data has been written.
      # Doing the backup AFTER writing data means the Percona standby will
      # restore close to the current state and replay only a small amount of WAL,
      # which is the realistic production migration pattern.
      kubectl -n "${CRUNCHY_NS}" annotate postgrescluster crunchy-source \
        postgres-operator.crunchydata.com/pgbackrest-backup="$(date +%s)"
    timeout: 30
