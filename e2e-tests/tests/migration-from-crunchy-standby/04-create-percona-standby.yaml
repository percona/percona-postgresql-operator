apiVersion: kuttl.dev/v1beta1
kind: TestStep
timeout: 20
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      source ../../functions

      # Retrieve the S3 repo path set when the Crunchy cluster was created
      REPO_PATH=$(kubectl get configmap crunchy-migration-config -n "${NAMESPACE}" \
        -o jsonpath='{.data.repo-path}')
      MINIO_ENDPOINT="seaweedfs-all-in-one.${NAMESPACE}.svc.cluster.local:8443"

      # Both clusters are in the same namespace; TLS secrets are already present.
      # Use the Crunchy HA service DNS for streaming replication.
      CRUNCHY_HOST="crunchy-source-ha.${NAMESPACE}.svc.cluster.local"

      # -----------------------------------------------------------------------
      # Create the Percona standby cluster:
      #   - repoName: repo1  → initial restore from the shared S3 backup
      #   - host/port        → ongoing streaming replication from the Crunchy primary
      #   - customTLSSecret  → lets Percona verify Crunchy's TLS and vice-versa
      #   - customReplicationTLSSecret → cert Percona presents as _crunchyreplication
      # -----------------------------------------------------------------------
      get_cr "percona-standby" "${REPO_PATH}" | \
        yq eval 'del(.spec.users)' | \
        yq eval ".spec.backups.pgbackrest.global.\"repo1-s3-uri-style\" = \"path\"" | \
        yq eval ".spec.backups.pgbackrest.global.\"repo1-s3-verify-tls\" = \"n\"" | \
        yq eval ".spec.backups.pgbackrest.repos[0].s3.endpoint = \"${MINIO_ENDPOINT}\"" | \
        yq eval ".spec.standby.enabled = true" | \
        yq eval ".spec.standby.repoName = \"repo1\"" | \
        yq eval ".spec.standby.host = \"${CRUNCHY_HOST}\"" | \
        yq eval ".spec.standby.port = 5432" | \
        yq eval ".spec.secrets.customTLSSecret.name = \"crunchy-source-cluster-cert\"" | \
        yq eval ".spec.secrets.customReplicationTLSSecret.name = \"crunchy-source-replication-cert\"" | \
        kubectl -n "${NAMESPACE}" apply -f -
