apiVersion: kuttl.dev/v1beta1
kind: TestStep
timeout: 180
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      source ../../functions

      CRUNCHY_NS="${NAMESPACE}-crunchy"

      # -----------------------------------------------------------------------
      # Pre-cutover: verify streaming replication lag is minimal.
      # Query pg_stat_replication on the Crunchy primary to confirm the Percona
      # standby is caught up before we stop writes.
      # -----------------------------------------------------------------------
      primary=$(kubectl get pod \
        -l postgres-operator.crunchydata.com/cluster=crunchy-source,postgres-operator.crunchydata.com/role=master \
        -n "${CRUNCHY_NS}" \
        -o jsonpath='{.items[0].metadata.name}')

      attempts=0
      max_attempts=12
      until kubectl exec -n "${CRUNCHY_NS}" "${primary}" -c database -- \
          psql -q -t -c "
            SELECT count(*) FROM pg_stat_replication
            WHERE state = 'streaming'
              AND (write_lag IS NULL OR write_lag < interval '5 seconds')
              AND (replay_lag IS NULL OR replay_lag < interval '5 seconds');
          " | grep -q "^[[:space:]]*[1-9]"; do
        attempts=$((attempts + 1))
        if [ "${attempts}" -ge "${max_attempts}" ]; then
          echo "ERROR: Percona standby replication lag too high before cutover"
          kubectl exec -n "${CRUNCHY_NS}" "${primary}" -c database -- \
            psql -c "SELECT client_addr, state, write_lag, flush_lag, replay_lag FROM pg_stat_replication;"
          exit 1
        fi
        echo "Waiting for standby lag to drop (attempt ${attempts}/${max_attempts})..."
        sleep 10
      done

      echo "Replication lag acceptable — proceeding with cutover"

      # -----------------------------------------------------------------------
      # Convert Crunchy to standby mode: Patroni demotes the leader, archives
      # the final WAL segments to S3, then enters recovery.
      # -----------------------------------------------------------------------
      kubectl patch postgrescluster crunchy-source \
        -n "${CRUNCHY_NS}" \
        --type=merge \
        -p '{"spec": {"standby": {"enabled": true, "repoName": "repo1"}}}'

      echo "Crunchy cluster patch applied — demotion verified in 08-assert"
