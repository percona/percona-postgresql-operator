apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 120
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: perconapgclusters.pgv2.percona.com
spec:
  group: pgv2.percona.com
  names:
    kind: PerconaPGCluster
    listKind: PerconaPGClusterList
    plural: perconapgclusters
    singular: perconapgcluster
  scope: Namespaced
---
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
metadata:
  name: check-percona-operator-ready
timeout: 120
commands:
  - script: |-
      kubectl wait deployment percona-postgresql-operator \
        -n "${OPERATOR_NS:-$NAMESPACE}" \
        --for=condition=Available \
        --timeout=120s
---
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
metadata:
  name: check-crunchy-operator-ready
timeout: 120
commands:
  - script: |-
      kubectl wait deployment pgo \
        -n "${NAMESPACE}" \
        --for=condition=Available \
        --timeout=120s
