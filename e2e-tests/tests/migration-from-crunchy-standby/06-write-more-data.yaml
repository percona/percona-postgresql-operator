apiVersion: kuttl.dev/v1beta1
kind: TestStep
timeout: 60
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      source ../../functions

      CRUNCHY_NS="${NAMESPACE}-crunchy"

      primary=$(kubectl get pod \
        -l postgres-operator.crunchydata.com/cluster=crunchy-source,postgres-operator.crunchydata.com/role=master \
        -n "${CRUNCHY_NS}" \
        -o jsonpath='{.items[0].metadata.name}')

      if [ -z "${primary}" ]; then
        echo "ERROR: Crunchy primary pod not found"
        exit 1
      fi

      # Write additional rows after standby is already syncing
      kubectl exec -n "${CRUNCHY_NS}" "${primary}" -c database -- bash -c "
        psql -d migrationtest -c \"INSERT INTO migration_data VALUES (2, 'data-added-while-standby-syncing');\"
        psql -d migrationtest -c \"INSERT INTO migration_data VALUES (3, 'more-data-for-replication-test');\"
      "
