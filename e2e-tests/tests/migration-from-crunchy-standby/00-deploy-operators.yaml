apiVersion: kuttl.dev/v1beta1
kind: TestStep
timeout: 20
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      source ../../functions
      init_temp_dir

      # singleNamespace=true scopes pgo to its own namespace only
      helm install pgo \
        oci://registry.developers.crunchydata.com/crunchydata/pgo \
        --namespace "${NAMESPACE}" \
        --version "${CPGO_VERSION}" \
        --set singleNamespace=true \
        --wait

      # Deploy SeaweedFS with TLS — pgBackRest requires HTTPS; repo1-s3-verify-tls=n skips validation.
      kubectl -n "${NAMESPACE}" apply -f "${TESTS_CONFIG_DIR}/minio-secret.yml"

      export access_key
      export secret_key
      access_key="$(kubectl -n "${NAMESPACE}" get secret minio-secret \
        -o jsonpath='{.data.AWS_ACCESS_KEY_ID}' | base64 -d)"
      secret_key="$(kubectl -n "${NAMESPACE}" get secret minio-secret \
        -o jsonpath='{.data.AWS_SECRET_ACCESS_KEY}' | base64 -d)"

      # Self-signed cert; SAN is irrelevant because verify-tls=n
      openssl req -x509 -nodes -days 3650 -newkey rsa:2048 \
        -keyout "${TEMP_DIR}/seaweedfs.key" \
        -out "${TEMP_DIR}/seaweedfs.crt" \
        -subj "/CN=seaweedfs-all-in-one"

      kubectl -n "${NAMESPACE}" create secret tls seaweedfs-s3-tls \
        --cert="${TEMP_DIR}/seaweedfs.crt" \
        --key="${TEMP_DIR}/seaweedfs.key"

      envsubst '${access_key} ${secret_key}' \
        < "conf/seaweedfs-values-template.yaml" \
        > "${TEMP_DIR}/seaweedfs-values.yaml"

      helm repo add seaweedfs https://seaweedfs.github.io/seaweedfs/helm 2>/dev/null || true
      helm repo update seaweedfs
      helm uninstall -n "${NAMESPACE}" seaweedfs 2>/dev/null || true
      retry 10 60 helm install seaweedfs seaweedfs/seaweedfs \
        -n "${NAMESPACE}" \
        --version "${SEAWEEDFS_VER:-4.23.0}" \
        -f "${TEMP_DIR}/seaweedfs-values.yaml" \
        --wait

      printf '[global]\nrepo1-s3-key=%s\nrepo1-s3-key-secret=%s\n' \
        "${access_key}" "${secret_key}" \
        > "${TEMP_DIR}/pgbackrest-s3.ini"

      kubectl -n "${NAMESPACE}" create secret generic "migration-from-crunchy-pgbackrest-secrets" \
        --from-file=cloud.conf="${TEMP_DIR}/pgbackrest-s3.ini"
      kubectl -n "${NAMESPACE}" create secret generic "crunchy-pgbackrest-secret" \
        --from-file=cloud.conf="${TEMP_DIR}/pgbackrest-s3.ini"

      deploy_operator
      deploy_client
