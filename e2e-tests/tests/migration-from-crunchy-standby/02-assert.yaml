apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 30
commands:
  - script: |-
      data=$(kubectl get configmap 02-initial-data -n "${NAMESPACE}" \
        -o jsonpath='{.data.data}')
      echo "${data}" | grep -q "initial-data-before-standby" || {
        echo "ERROR: initial data not found. Got: ${data}"
        exit 1
      }
