apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      source ../../functions

      # Promote the Percona standby to a primary cluster by disabling standby mode
      kubectl patch perconapgcluster percona-standby \
        -n "${NAMESPACE}" \
        --type=merge \
        -p '{"spec": {"standby": {"enabled": false}}}'

      echo "Percona standby promotion triggered"
    timeout: 60
