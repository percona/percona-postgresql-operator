apiVersion: kuttl.dev/v1beta1
kind: TestStep
timeout: 480
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      source ../../functions

      # Poll until initial data from Crunchy is visible on the Percona standby.
      # The standby replays WAL archived to S3 by Crunchy, so there may be lag.
      data=""
      attempts=0
      max_attempts=30

      until [ -n "${data}" ]; do
        data=$(kubectl exec -n "${NAMESPACE}" \
          $(kubectl get pod -n "${NAMESPACE}" \
            -l postgres-operator.crunchydata.com/cluster=percona-standby,postgres-operator.crunchydata.com/data=postgres \
            -o jsonpath='{.items[0].metadata.name}') \
          -c database -- bash -c \
          "psql -q -t -d migrationtest -c 'SELECT id, value FROM migration_data WHERE id = 1;' 2>/dev/null" \
          2>/dev/null || true)

        attempts=$((attempts + 1))
        if [ "${attempts}" -ge "${max_attempts}" ]; then
          echo "ERROR: initial data not visible on Percona standby after $((max_attempts * 15)) seconds"
          exit 1
        fi
        sleep 15
      done

      kubectl create configmap -n "${NAMESPACE}" 05-standby-initial-sync \
        --from-literal=data="${data}"
