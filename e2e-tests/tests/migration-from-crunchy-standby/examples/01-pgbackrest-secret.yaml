# For the Crunchy operator:
apiVersion: v1
kind: Secret
metadata:
  name: crunchy-pgbackrest-secret
stringData:
  cloud.conf: |
    [global]
    repo1-s3-key=pgmigration
    repo1-s3-key-secret=pgmigration123
---
# For the Percona operator (same credentials, different secret name):
apiVersion: v1
kind: Secret
metadata:
  name: percona-pgbackrest-secret
stringData:
  cloud.conf: |
    [global]
    repo1-s3-key=pgmigration
    repo1-s3-key-secret=pgmigration123
