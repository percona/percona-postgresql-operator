apiVersion: kuttl.dev/v1beta1
kind: TestStep
delete:
- apiVersion: pgv2.percona.com/v2
  kind: PerconaPGCluster
  metadata:
    name: upgrade-minor
- apiVersion: upstream.pgv2.percona.com/v1beta1
  kind: PostgresCluster
  metadata:
    name: upgrade-minor
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      source ../../functions

      kubectl -n ${NAMESPACE} patch postgresclusters.postgres-operator.crunchydata.com upgrade-minor --type=json -p='[{"op": "remove", "path": "/metadata/finalizers"}]'
      kubectl -n ${NAMESPACE} delete postgresclusters.postgres-operator.crunchydata.com upgrade-minor || true
      remove_all_finalizers
      check_operator_panic
      destroy_operator
    timeout: 60
