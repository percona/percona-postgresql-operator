apiVersion: kuttl.dev/v1beta1
kind: TestStep
delete:
- apiVersion: pgv3.percona.com/v2
  kind: PerconaPGCluster
- apiVersion: upstream.pgv3.percona.com/v1beta1
  kind: PostgresCluster
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      source ../../functions

      kubectl -n ${NAMESPACE} patch postgrescluster upgrade-minor --type=merge -p='{"metadata":{"finalizers":[]}}' 2>/dev/null || true
      kubectl -n ${NAMESPACE} delete postgrescluster upgrade-minor --ignore-not-found
      remove_all_finalizers
      check_operator_panic
      destroy_operator
    timeout: 60
