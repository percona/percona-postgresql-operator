apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 120
commands:
  - script: |
      set -o errexit
      set -o xtrace

      until kubectl assert exist-enhanced crd perconapgclusters.pgv2.percona.com --timeout 10s; do
        echo "Waiting for CRD to be registered..."
        sleep 5
      done

      until kubectl assert exist-enhanced deployment percona-postgresql-operator -n ${OPERATOR_NS:-$NAMESPACE} --field-selector status.readyReplicas=1 --timeout 10s; do
        echo "Waiting for operator to be ready..."
        sleep 5
      done
