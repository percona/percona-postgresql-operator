apiVersion: pgv2.percona.com/v2
kind: PerconaPGCluster
metadata:
  name: custom-extensions
spec:
  extensions:
    image: <image>
    imagePullPolicy: Always
    builtin:
      pg_stat_monitor: false
      pg_stat_statements: true
    storage:
      type: s3
      bucket: operator-testing
      region: us-east-1
      endpoint: http://minio-service:9000
      forcePathStyle: true
      disableSSL: true
      secret:
        name: minio-secret
