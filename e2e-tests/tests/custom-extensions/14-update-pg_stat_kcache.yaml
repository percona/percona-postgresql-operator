apiVersion: pgv2.percona.com/v2
kind: PerconaPGCluster
metadata:
  name: custom-extensions
spec:
  extensions:
    custom:
    - name: pg_stat_kcache
      version: 2.3.2
  patroni:
    dynamicConfiguration:
      postgresql:
        parameters:
          shared_preload_libraries: pg_stat_statements,pg_stat_kcache
