apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      source ../../functions

      sleep 30

      # pg_stat_monitor
      run_psql_local \
        "SELECT pg_stat_monitor_reset();" \
        "postgres:$(get_psql_user_pass builtin-extensions-pguser-postgres)@$(get_psql_user_host builtin-extensions-pguser-postgres)/postgres"

    timeout: 360

