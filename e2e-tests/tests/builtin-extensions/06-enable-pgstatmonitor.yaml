apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      # community images do not ship pg_stat_monitor; keep the patch so the
      # cluster generation still increments and 06-assert.yaml passes.
      PG_STAT_MONITOR="true"
      if [[ "${PG_DISTRIBUTION}" == "community" ]]; then
        PG_STAT_MONITOR="false"
      fi

      kubectl patch -n "${NAMESPACE}" perconapgcluster/builtin-extensions --type=merge -p "{
        \"spec\": {
          \"patroni\": {
            \"dynamicConfiguration\": {
              \"postgresql\": {
                \"parameters\": {
                  \"pgaudit.log\": \"ddl,write,role\",
                  \"pgaudit.log_level\": \"warning\",
                  \"logging_collector\": \"off\"
                }
              }
            }
          },
          \"extensions\": {
            \"pg_stat_monitor\": {
              \"enabled\": ${PG_STAT_MONITOR}
            },
            \"pg_stat_statements\": {
              \"enabled\": false
            },
            \"pg_audit\": {
              \"enabled\": true
            },
            \"pgvector\": {
              \"enabled\": true
            },
            \"pg_repack\": {
              \"enabled\": true
            },
            \"pg_cron\": {
              \"enabled\": true
            },
            \"set_user\": {
              \"enabled\": true
            }
          }
        }
      }"
