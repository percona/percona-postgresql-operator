apiVersion: kuttl.dev/v1beta1
kind: TestStep
timeout: 240
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      source ../../functions

      kubectl -n "${NAMESPACE}" patch perconapgcluster pgbouncer-mtls --type=merge \
        -p '{"spec":{"proxy":{"pgBouncer":{"additionalTrustedCAs":[{"name":"external-ca"}]}}}}'

      # The operator merges the generated CA and the external CA into the
      # frontend bundle of the pgbouncer Secret.
      bundle_has_two_cas() {
        [[ $(kubectl -n "${NAMESPACE}" get secret pgbouncer-mtls-pgbouncer \
          -o jsonpath='{.data.pgbouncer-frontend\.ca-roots}' | base64 -d | grep -c 'BEGIN CERTIFICATE') -ge 2 ]]
      }
      retry 30 5 bundle_has_two_cas
