apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 660
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      kubectl wait --for=jsonpath='{.status.state}'=Succeeded --timeout=560s -n "${NAMESPACE}" pg-backup/demand-backup-full-repo1
      kubectl wait --for=jsonpath='{.status.backupType}'=full --timeout=120s -n "${NAMESPACE}" pg-backup/demand-backup-full-repo1
      kubectl -n "${NAMESPACE}" get pg-backup demand-backup-full-repo1 -o json | jq -e '.status.size != null' >/dev/null

      kubectl wait --for=jsonpath='{.status.state}'=Succeeded --timeout=560s -n "${NAMESPACE}" pg-backup/demand-backup-differential-repo1
      kubectl wait --for=jsonpath='{.status.backupType}'=diff --timeout=120s -n "${NAMESPACE}" pg-backup/demand-backup-differential-repo1
      kubectl -n "${NAMESPACE}" get pg-backup demand-backup-differential-repo1 -o json | jq -e '.status.size != null' >/dev/null

      kubectl wait --for=jsonpath='{.status.state}'=Succeeded --timeout=560s -n "${NAMESPACE}" pg-backup/demand-backup-incremental-repo1
      kubectl wait --for=jsonpath='{.status.backupType}'=incr --timeout=120s -n "${NAMESPACE}" pg-backup/demand-backup-incremental-repo1
      kubectl -n "${NAMESPACE}" get pg-backup demand-backup-incremental-repo1 -o json | jq -e '.status.size != null' >/dev/null
---
kind: Job
apiVersion: batch/v1
metadata:
  annotations:
    postgres-operator.crunchydata.com/pgbackrest-backup: demand-backup-full-repo1
  labels:
    postgres-operator.crunchydata.com/pgbackrest-backup: manual
    postgres-operator.crunchydata.com/pgbackrest-repo: repo1
  ownerReferences:
    - apiVersion: pgv2.percona.com/v2
      kind: PerconaPGBackup
      controller: true
      blockOwnerDeletion: true
spec:
  backoffLimit: 20
  template:
    metadata:
      annotations:
        postgres-operator.crunchydata.com/pgbackrest-backup: demand-backup-full-repo1
    spec:
      containers:
      - command:
        - /opt/crunchy/bin/pgbackrest
        imagePullPolicy: Always
        name: pgbackrest
        resources: {}
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          privileged: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /opt/crunchy
          name: crunchy-bin
        - mountPath: /etc/pgbackrest/conf.d
          name: pgbackrest-config
          readOnly: true
      dnsPolicy: ClusterFirst
      enableServiceLinks: false
      restartPolicy: OnFailure
      schedulerName: default-scheduler
      securityContext:
        fsGroupChangePolicy: OnRootMismatch
      serviceAccount: demand-backup-pgbackrest
      serviceAccountName: demand-backup-pgbackrest
      terminationGracePeriodSeconds: 30
      volumes:
      - emptyDir: {}
        name: crunchy-bin
      - name: pgbackrest-config
        projected:
          defaultMode: 420
          sources:
          - secret:
              name: demand-backup-pgbackrest-secrets
          - configMap:
              items:
              - key: pgbackrest_repo.conf
                path: pgbackrest_repo.conf
              - key: config-hash
                path: config-hash
              - key: pgbackrest-server.conf
                path: ~postgres-operator_server.conf
              name: demand-backup-pgbackrest-config
          - secret:
              items:
              - key: pgbackrest.ca-roots
                path: ~postgres-operator/tls-ca.crt
              - key: pgbackrest-client.crt
                path: ~postgres-operator/client-tls.crt
              - key: pgbackrest-client.key
                mode: 384
                path: ~postgres-operator/client-tls.key
              name: demand-backup-pgbackrest
status:
  succeeded: 1
---
apiVersion: pgv2.percona.com/v2
kind: PerconaPGBackup
metadata:
  name: demand-backup-full-repo1
spec:
  pgCluster: demand-backup
  repoName: repo1
  options:
    - --type=full
status:
  state: Succeeded
---
apiVersion: upstream.pgv2.percona.com/v1beta1
kind: PostgresCluster
metadata:
  name: demand-backup
  generation: 4
status:
  observedGeneration: 4

