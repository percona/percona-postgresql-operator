apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 560
---
kind: Job
apiVersion: batch/v1
metadata:
  annotations:
    postgres-operator.crunchydata.com/pgbackrest-backup: demand-backup-full-repo3
  labels:
    postgres-operator.crunchydata.com/pgbackrest-backup: manual
    postgres-operator.crunchydata.com/pgbackrest-repo: repo3
  ownerReferences:
    - apiVersion: pgv2.percona.com/v2
      kind: PerconaPGBackup
      controller: true
      blockOwnerDeletion: true
status:
  succeeded: 1
---
kind: Job
apiVersion: batch/v1
metadata:
  annotations:
    postgres-operator.crunchydata.com/pgbackrest-backup: demand-backup-full-repo3
  labels:
    postgres-operator.crunchydata.com/pgbackrest-backup: manual
    postgres-operator.crunchydata.com/pgbackrest-repo: repo3
  ownerReferences:
    - apiVersion: pgv2.percona.com/v2
      kind: PerconaPGBackup
      controller: true
      blockOwnerDeletion: true
status:
  succeeded: 1
---
apiVersion: pgv2.percona.com/v2
kind: PerconaPGBackup
metadata:
  name: demand-backup-full-repo3
spec:
  pgCluster: demand-backup
  repoName: repo3
  options:
    - --type=full
status:
  state: Succeeded
---
apiVersion: upstream.pgv2.percona.com/v1beta1
kind: PostgresCluster
metadata:
  name: demand-backup
  generation: 8
status:
  observedGeneration: 8

---
apiVersion: kuttl.dev/v1beta1
kind: TestAssert
timeout: 560
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      kubectl wait --for=jsonpath='{.status.backupType}'=full --timeout=120s -n "${NAMESPACE}" pg-backup/demand-backup-full-repo3
      kubectl -n "${NAMESPACE}" get pg-backup demand-backup-full-repo3 -o json | jq -e '.status.size != null' >/dev/null

      kubectl wait --for=jsonpath='{.status.state}'=Succeeded --timeout=560s -n "${NAMESPACE}" pg-backup/demand-backup-differential-repo1
      kubectl wait --for=jsonpath='{.status.backupType}'=diff --timeout=120s -n "${NAMESPACE}" pg-backup/demand-backup-differential-repo1
      kubectl -n "${NAMESPACE}" get pg-backup demand-backup-differential-repo1 -o json | jq -e '.status.size != null' >/dev/null

      kubectl wait --for=jsonpath='{.status.state}'=Succeeded --timeout=560s -n "${NAMESPACE}" pg-backup/demand-backup-incremental-repo1
      kubectl wait --for=jsonpath='{.status.backupType}'=incr --timeout=120s -n "${NAMESPACE}" pg-backup/demand-backup-incremental-repo1
      kubectl -n "${NAMESPACE}" get pg-backup demand-backup-incremental-repo1 -o json | jq -e '.status.size != null' >/dev/null

