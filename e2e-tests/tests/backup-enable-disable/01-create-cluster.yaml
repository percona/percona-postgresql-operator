apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      source ../../functions

      get_cr "some-name" ${RANDOM} \
        | yq '.spec.backups.enabled=false | del(.spec.backups.pgbackrest)' \
        | kubectl -n "${NAMESPACE}" apply -f -
