apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      source ../../functions

      get_cr "some-name" ${RANDOM} \
        | yq 'del(.metadata.annotations."pgv3.percona.com/authorizeBackupRemoval")' \
        | yq 'del(.spec.backups.enabled)' \
        | kubectl -n "${NAMESPACE}" apply -f -
