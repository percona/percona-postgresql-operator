apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      source ../../functions

      if kubectl -n ${NAMESPACE} get sts some-name-repo-host; then
        echo "backups are not disabled properly"
        exit 1
      fi

      if [[ $(kubectl get job --no-headers -l postgres-operator.crunchydata.com/pgbackrest-backup=replica-create | wc -l) -gt 0 ]]; then
        echo "backups are not disabled properly"
        exit 1
      fi

      if kubectl -n "${NAMESPACE}" get pvc some-name-repo1 >/dev/null 2>&1; then
        echo "expected pgBackRest repo PVC to not exist"
        exit 1
      fi
