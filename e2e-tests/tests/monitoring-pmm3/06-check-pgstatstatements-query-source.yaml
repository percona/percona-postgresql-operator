apiVersion: kuttl.dev/v1beta1
kind: TestStep
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      source ../../functions

      primary=$(get_pod_by_role monitoring-pmm3 primary name)
      kubectl -n ${NAMESPACE} exec ${primary} -- bash -c 'psql -c "SELECT * FROM pg_extension;"'
      if ! kubectl -n ${NAMESPACE} exec ${primary} -- bash -c 'psql -c "SELECT extname FROM pg_extension;"' | grep pg_stat_statements; then
        echo "pg_stat_statements is not found in pg_extension"
        exit 1
      fi

      # Verify that the QAN agent is running with pgstatements query source
      if ! kubectl -n ${NAMESPACE} exec ${primary} -c pmm-client -- pmm-admin list | grep postgresql_pgstatements_agent; then
        echo "postgresql_pgstatements_agent is not running"
        exit 1
      fi
    timeout: 360
