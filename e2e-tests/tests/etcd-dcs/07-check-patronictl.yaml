apiVersion: kuttl.dev/v1beta1
kind: TestStep
timeout: 60
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      source ../../functions

      instance=$(kubectl -n "${NAMESPACE}" get pod \
        -l postgres-operator.crunchydata.com/instance-set=instance1 \
        -o jsonpath='{.items[0].metadata.name}')

      patronictl_out=$(kubectl -n "${NAMESPACE}" exec "${instance}" -c database -- \
        patronictl list)

      echo "${patronictl_out}"
      echo "${patronictl_out}" | grep -q "Leader"
      echo "${patronictl_out}" | grep -q "running"
