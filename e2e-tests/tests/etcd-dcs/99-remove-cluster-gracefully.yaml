apiVersion: kuttl.dev/v1beta1
kind: TestStep
delete:
- apiVersion: pgv2.percona.com/v2
  kind: PerconaPGCluster
  metadata:
    name: etcd-dcs
- apiVersion: upstream.pgv2.percona.com/v1beta1
  kind: PostgresCluster
  metadata:
    name: etcd-dcs
- apiVersion: apps/v1
  kind: StatefulSet
  metadata:
    name: etcd
- apiVersion: v1
  kind: Service
  metadata:
    name: etcd
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      source ../../functions

      remove_all_finalizers
      check_operator_panic
      destroy_operator
    timeout: 60
