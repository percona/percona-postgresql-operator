apiVersion: kuttl.dev/v1beta1
kind: TestStep
timeout: 30
commands:
  - script: |-
      set -o errexit
      set -o xtrace

      source ../../functions

      keys=$(kubectl -n "${NAMESPACE}" exec etcd-0 -- \
        env ETCDCTL_API=3 etcdctl --endpoints=http://localhost:2379 \
        get / --prefix --keys-only)

      echo "${keys}"
      echo "${keys}" | grep -q "etcd-dcs-ha"
